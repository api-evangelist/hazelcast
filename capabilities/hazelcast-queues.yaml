naftiko: 1.0.0-alpha2
info:
  label: Hazelcast REST API — Queues
  description: 'Hazelcast REST API — Queues. 3 operations. Lead operation: Offer item to queue. Self-contained Naftiko capability
    covering one Hazelcast business surface.'
  tags:
  - Hazelcast
  - Queues
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HAZELCAST_API_KEY: HAZELCAST_API_KEY
capability:
  consumes:
  - type: http
    namespace: hazelcast-queues
    baseUri: http://{host}:{port}
    description: Hazelcast REST API — Queues business capability. Self-contained, no shared references.
    resources:
    - name: hazelcast-rest-queues-queueName
      path: /hazelcast/rest/queues/{queueName}
      operations:
      - name: offerqueueitem
        method: POST
        description: Offer item to queue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: queueName
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: pollqueueitem
        method: DELETE
        description: Poll item from queue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: queueName
          in: path
          type: string
          required: true
        - name: timeout
          in: query
          type: integer
    - name: hazelcast-rest-queues-queueName-size
      path: /hazelcast/rest/queues/{queueName}/size
      operations:
      - name: getqueuesize
        method: GET
        description: Get queue size
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: queueName
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: hazelcast-queues-rest
    port: 8080
    description: REST adapter for Hazelcast REST API — Queues. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/hazelcast/rest/queues/{queuename}
      name: hazelcast-rest-queues-queuename
      description: REST surface for hazelcast-rest-queues-queueName.
      operations:
      - method: POST
        name: offerqueueitem
        description: Offer item to queue
        call: hazelcast-queues.offerqueueitem
        with:
          queueName: rest.queueName
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: pollqueueitem
        description: Poll item from queue
        call: hazelcast-queues.pollqueueitem
        with:
          queueName: rest.queueName
          timeout: rest.timeout
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hazelcast/rest/queues/{queuename}/size
      name: hazelcast-rest-queues-queuename-size
      description: REST surface for hazelcast-rest-queues-queueName-size.
      operations:
      - method: GET
        name: getqueuesize
        description: Get queue size
        call: hazelcast-queues.getqueuesize
        with:
          queueName: rest.queueName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hazelcast-queues-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hazelcast REST API — Queues. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: offer-item-queue
      description: Offer item to queue
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: hazelcast-queues.offerqueueitem
      with:
        queueName: tools.queueName
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: poll-item-queue
      description: Poll item from queue
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: hazelcast-queues.pollqueueitem
      with:
        queueName: tools.queueName
        timeout: tools.timeout
      outputParameters:
      - type: object
        mapping: $.
    - name: get-queue-size
      description: Get queue size
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hazelcast-queues.getqueuesize
      with:
        queueName: tools.queueName
      outputParameters:
      - type: object
        mapping: $.
