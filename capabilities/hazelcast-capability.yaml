      operations:
      - name: getmapentry
        method: GET
        description: Get map entry
        inputParameters:
        - name: mapName
          in: path
          type: string
          required: true
        - name: key
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
