aid: hazelcast
name: Hazelcast
description: >-
  Hazelcast is a real-time data platform that helps businesses accelerate their applications with data caching, data
  integration, and distributed computing. Hazelcast provides in-memory computing capabilities for high-performance,
  low-latency applications, exposing a REST API for managing maps, queues, cluster state, configuration, and health.
type: Index
